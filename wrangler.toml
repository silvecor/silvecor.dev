'$schema' = './node_modules/wrangler/config-schema.json'
name = 'silvecor-dev'
compatibility_date = '2026-06-21'

no_bundle = true
upload_source_maps = true

[assets]
directory = './dist/public'
html_handling = 'drop-trailing-slash'

[observability]
enabled = true

[[rules]]
type = 'ESModule'
globs = [
  '**/*.js',
  '**/*.mjs',
]
